[server]
http_port = 8009
log_dir = "/opt/cpc/state"

[[models]]
name = "gpt-oss-20b"
base_url = "http://127.0.0.1:8007"
model_id = "openai/gpt-oss-20b"
strip_thinking_tags = true
max_tokens = 4096
temperature = 0.7

[[models]]
name = "nemotron-super-49b"
base_url = "http://127.0.0.1:8005"
model_id = "nemotron-super-49b-v1.5"
max_tokens = 4096
temperature = 0.6

[[models]]
name = "qwen3-coder-30b"
base_url = "http://127.0.0.1:8006"
model_id = "qwen3-coder-30b-a3b"
max_tokens = 4096
temperature = 0.7

[[mcp_servers]]
name = "hands"
command = "/root/hands/target/release/hands"
args = []

[[mcp_servers]]
name = "workflow"
command = "/root/workflow/target/release/workflow"
args = []
env = { WORKFLOW_PLAIN_CREDS_OK = "1" }

[[mcp_servers]]
name = "model_router"
command = "/root/model-router/target/release/model-router"
args = []
env = { MODEL_ROUTER_BASE_URL = "http://127.0.0.1:8003", MODEL_ROUTER_PLANNER_MODEL = "nemotron-super-49b", MODEL_ROUTER_CODER_MODEL = "qwen3-coder-30b-gguf", MODEL_ROUTER_CHECKER_MODEL = "nemotron-super-49b", RUST_LOG = "info" }

[[mcp_servers]]
name = "transcripts"
command = "/root/mcp-transcripts/target/release/mcp-transcripts"
args = []
env = { TRANSCRIPT_DIR = "/opt/cpc/transcripts" }

[[mcp_servers]]
name = "container_exec"
command = "/root/mcp-container-exec/target/release/mcp-container-exec"
args = []

[[mcp_servers]]
name = "host_ops"
command = "/root/mcp-host-ops/target/release/mcp-host-ops"
args = []

[[mcp_servers]]
name = "httpbin_typed_demo"
command = "/root/.cpc/graduated/mcp-httpbin-typed-demo/target/release/httpbin-typed-demo"
args = []

[[mcp_servers]]
name = "httpbin_post_demo"
command = "/root/.cpc/graduated/mcp-httpbin-post-demo/target/release/httpbin-post-demo"
args = []
