[server]
http_port = 8009
log_dir = "/opt/cpc/state"

[[models]]
name = "gpt-oss-20b"
base_url = "http://127.0.0.1:8007"
model_id = "openai/gpt-oss-20b"
strip_thinking_tags = true
max_tokens = 4096
temperature = 0.7
mcp_servers = ["hands", "workflow"]
tool_filter = [
  "browser_attach", "browser_navigate", "browser_extract_content", "browser_get_text",
  "browser_a11y_snapshot", "browser_click", "browser_type", "browser_screenshot",
  "browser_new_tab", "browser_switch_tab", "browser_list_tab", "browser_close_tab",
  "browser_get_network_log", "browser_get_performance_log", "browser_learn_api",
  "api_store", "api_list", "api_call", "api_test"
]

[[models]]
name = "gpt-oss-120b"
base_url = "http://127.0.0.1:8008"
model_id = "gpt-oss-120b"
strip_thinking_tags = true
max_tokens = 4096
temperature = 1.0
mcp_servers = ["hands", "workflow"]
tool_filter = [
  "browser_attach", "browser_navigate", "browser_extract_content", "browser_get_text",
  "browser_a11y_snapshot", "browser_click", "browser_type", "browser_screenshot",
  "browser_new_tab", "browser_switch_tab", "browser_list_tab", "browser_close_tab",
  "browser_get_network_log", "browser_get_performance_log", "browser_learn_api",
  "api_store", "api_list", "api_call", "api_test"
]

[[mcp_servers]]
name = "hands"
command = "/root/hands/target/release/hands"
args = []

[[mcp_servers]]
name = "workflow"
command = "/root/workflow/target/release/workflow"
args = []
env = { WORKFLOW_PLAIN_CREDS_OK = "1" }

# model_router commented out - nemotron-3-super-120b was killed 2026-05-09
# Re-enable after pointing env vars at a live model
# [[mcp_servers]]
# name = "model_router"
# command = "/root/model-router/target/release/model-router"
# args = []
# env = { MODEL_ROUTER_BASE_URL = "http://127.0.0.1:8003", MODEL_ROUTER_PLANNER_MODEL = "nemotron-3-super-120b", MODEL_ROUTER_CODER_MODEL = "qwen3-coder-30b-gguf", MODEL_ROUTER_CHECKER_MODEL = "nemotron-3-super-120b", RUST_LOG = "info" }

[[mcp_servers]]
name = "transcripts"
command = "/root/mcp-transcripts/target/release/mcp-transcripts"
args = []
env = { TRANSCRIPT_DIR = "/opt/cpc/transcripts" }

[[mcp_servers]]
name = "container_exec"
command = "/root/mcp-container-exec/target/release/mcp-container-exec"
args = []

[[mcp_servers]]
name = "host_ops"
command = "/root/mcp-host-ops/target/release/mcp-host-ops"
args = []

[[mcp_servers]]
name = "httpbin_typed_demo"
command = "/root/.cpc/graduated/mcp-httpbin-typed-demo/target/release/httpbin-typed-demo"
args = []

[[mcp_servers]]
name = "httpbin_post_demo"
command = "/root/.cpc/graduated/mcp-httpbin-post-demo/target/release/httpbin-post-demo"
args = []

[reranker]
enabled = true
base_url = "http://127.0.0.1:8010"
model_id = "qwen3-coder-30b"
min_tool_result_bytes = 2048
max_summary_tokens = 800
